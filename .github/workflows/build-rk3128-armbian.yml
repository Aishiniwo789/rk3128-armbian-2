name: Build Armbian for RK3128 with CUPS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          temp-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true
          remove-haskell: true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ccache gcc-aarch64-linux-gnu bc bison build-essential cpio crossbuild-essential-arm64 device-tree-compiler flex gawk gdisk gettext git libelf-dev libncurses5-dev libpython3-dev libssl-dev lzop parted python3-distutils qemu-user-static rsync swig u-boot-tools uuid-dev xmlto zip dosfstools wget curl fdisk kpartx pv

      - name: Setup ccache environment
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-rk3128-ccache
          max-size: 4G

      - name: Clone Armbian build framework
        run: git clone --depth=1 https://github.com/armbian/build.git armbian-build

      - name: Create userpatches directory for RK3128
        run: |
          mkdir -p armbian-build/userpatches/kernel/rockchip-rk3128-current/
          mkdir -p armbian-build/userpatches/lib/config/sources/

      - name: Add RK3128 kernel configuration
        run: |
          cat > armbian-build/userpatches/kernel/rockchip-rk3128-current.config << 'EOF'
          CONFIG_MACH_RK3128=y
          CONFIG_USB_PRINTER=y
          CONFIG_USB_NET_DRIVERS=y
          CONFIG_PHY_ROCKCHIP_INNO_USB2=y
          CONFIG_ROCKCHIP_PHY=y
          CONFIG_DRM_ROCKCHIP=y
          CONFIG_ROCKCHIP_THERMAL=y
          CONFIG_MMC_DW_ROCKCHIP=y
          CONFIG_I2C_RK3X=y
          CONFIG_SPI_ROCKCHIP=y
          EOF

      - name: Create RK3128 board configuration
        run: |
          cat > armbian-build/userpatches/lib/config/sources/rockchip-rk312x.conf << 'EOF'
          # Rockchip RK312x family
          BOOT_SOC="rk312x"
          BOOT_USE_MAINLINE_ATF="no"
          BOOT_FDT_FILE="rockchip/rk3128-box.dtb"
          
          case $BRANCH in
              current)
                  KERNELSOURCE='https://github.com/rockchip-linux/kernel'
                  KERNELBRANCH='branch:develop-5.10'
                  KERNELPATCHDIR='rockchip-rk312x-current'
                  ;;
          esac
          
          FAMILY="rockchip-rk312x"
          EOF

      - name: Create custom package install script
        run: |
          mkdir -p armbian-build/userpatches/overlay
          cat > armbian-build/userpatches/overlay/install-cups.sh << 'EOF'
          #!/bin/bash
          apt-get update
          apt-get install -y cups cups-bsd cups-client cups-filters printer-driver-all printer-driver-gutenprint avahi-daemon avahi-discover avahi-utils libnss-mdns
          systemctl enable cups
          EOF
          chmod +x armbian-build/userpatches/overlay/install-cups.sh

      - name: Compile Armbian for RK3128
        run: |
          cd armbian-build
          ./compile.sh \
            BOARD=rk3128-box \
            BRANCH=current \
            RELEASE=jammy \
            BUILD_MINIMAL=no \
            BUILD_DESKTOP=no \
            KERNEL_ONLY=no \
            KERNEL_CONFIGURE=no \
            COMPRESS_OUTPUTIMAGE=sha,img \
            INSTALL_HEADERS=no \
            ENABLE_EXTENSIONS=ssh \
            EXTRA_USERPATCHES_OVERLAY=install-cups.sh

      - name: Upload Armbian image
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-RK3128-CUPS
          path: armbian-build/output/images/*.img
          if-no-files-found: error
          retention-days: 7
